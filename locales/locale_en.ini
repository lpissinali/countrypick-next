text30 = for Your Next Adventure
text31 = Every traveler has a dream destination. Country Pick’s Featured Destinations highlight the top experiences in these iconic locations, from the bustling streets of Tokyo’s Shinjuku district to the world-renowned ancient ruins of Rome. Discover unforgettable tours that reveal hidden gems and offer unique perspectives of these must-visit places.
text32 = How
text33 = Works
text34 = Once you have experienced the country first hand, mark it as visited on your map, write about your adventures, upload your holiday pictures to inspire other Country Pick users and download your personalized map to share with friends and family on social media.
text35 = Getting Started
text36 = The first step to uncovering the world’s hidden gems is to create a free Country Pick account.
text37 = Pick a Country
text38 = Select any country on the interactive map above to explore the thrilling attractions, eye-opening tours and boutique accommodation available
text39 = Add Your Trips
text40 = Inspire other Country Pick users by creating new trips based on your experiences, adding photos of your adventures and writing about once in a lifetime things to do.
text41 = Share with Friends
