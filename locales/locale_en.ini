q1 = What is the best time to visit {country}?
a1 = The best time to visit {country} depends on your preferences. Spring and autumn generally offer the most pleasant weather and fewer crowds, making them ideal for sightseeing and outdoor activities. Local seasonal conditions vary, so check weather patterns before booking.
q2 = What is the capital of {country}?
a2 = The capital city of {country} is {capital}. It is the political and cultural heart of the country and typically one of the top destinations for visitors.
q3 = What currency is used in {country}?
a3 = The official currency of {country} is the {currency}. It is advisable to exchange currency before you travel or use ATMs upon arrival for the best rates. Major credit cards are accepted in most hotels and restaurants.
q4 = What language is spoken in {country}?
a4 = The official language spoken in {country} is {language}. In major tourist areas, hotels and international restaurants, English is often widely understood.
q5 = What are the top destinations to visit in {country}?
a5 = The top destinations to visit in {country} include {gems}. Each offers a unique mix of culture, history and natural attractions that make {country} a rewarding travel destination.

[city_faq]
q1 = What are the top things to do in {city}?
a1 = {city} offers a wide variety of exciting activities and attractions. The top things to do include {things}. Whether you are interested in history, culture, food or outdoor adventures, there is something for every type of traveller.
q2 = Where is {city} located?
a2 = {city} is located in {country}. It is one of the most visited destinations in the country, known for its unique culture, history and natural attractions.
q3 = Is {city} worth visiting?
a3 = Absolutely. {city} is one of {country}'s most rewarding destinations, offering a rich blend of culture, history and natural beauty. Visitors consistently rate it as a highlight of any trip to {country}.

