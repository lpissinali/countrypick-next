[country_faq]
title = Preguntas
title2 = Frecuentes
q1 = ¿Cuál es la mejor época para visitar {country}?
a1 = La mejor época para visitar {country} depende de tus preferencias. La primavera y el otoño suelen ofrecer el clima más agradable y menos aglomeraciones, lo que los convierte en momentos ideales para el turismo y las actividades al aire libre. Las condiciones estacionales varían, así que consulta los patrones meteorológicos antes de reservar.
q2 = ¿Cuál es la capital de {country}?
a2 = La capital de {country} es {capital}. Es el centro político y cultural del país y, por lo general, uno de los principales destinos para los visitantes.
q3 = ¿Qué moneda se utiliza en {country}?
a3 = La moneda oficial de {country} es el {currency}. Es recomendable cambiar divisas antes de viajar o utilizar cajeros automáticos a la llegada para obtener las mejores tasas. Las principales tarjetas de crédito se aceptan en la mayoría de hoteles y restaurantes.
q4 = ¿Qué idioma se habla en {country}?
a4 = El idioma oficial hablado en {country} es el {language}. En las principales zonas turísticas, hoteles y restaurantes internacionales, el inglés suele entenderse ampliamente.
q5 = ¿Cuáles son los principales destinos para visitar en {country}?
a5 = Los principales destinos para visitar en {country} incluyen {gems}. Cada uno ofrece una combinación única de cultura, historia y atracciones naturales que hacen de {country} un destino de viaje muy gratificante.

[city_faq]
q1 = ¿Cuáles son las mejores cosas que hacer en {city}?
a1 = {city} ofrece una gran variedad de actividades y atracciones emocionantes. Las principales cosas que hacer incluyen {things}. Ya sea que te interese la historia, la cultura, la gastronomía o las aventuras al aire libre, hay algo para todo tipo de viajero.
q2 = ¿Dónde está ubicada {city}?
