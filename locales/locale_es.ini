;Attractions
[attractions]
title = Atracciones imperdibles alrededor del mundo | Country Pick
description = Descubre increíbles tours, dónde alojarte, qué hacer y las mejores atracciones que cada país tiene para ofrecer alrededor del mundo.
text1 = Imperdible
text2 = Atracciones
text3 = La vuelta al mundo
text4 = 15 de las mejores y más populares atracciones turísticas del mundo.
text5 = Gran Cañón: la maravilla natural más emblemática del mundo
text6 = No importa cuánto hayas leído sobre él, cuántos documentales hayas visto o cuántas fotos hayas visto, la inmensidad del Gran Cañón siempre deja sin palabras a quienes lo visitan por primera vez. Designado como una de las siete maravillas del mundo natural, el cañón es sin duda la principal atracción de Estados Unidos.
text7 = Tour del Gran Cañón
text8 = Pirámides de Giza
text9 = Pirámides de Giza: El mundo antiguo cobra vida
text10 = Las pirámides de Giza, la única maravilla antigua que queda del mundo, son una de las atracciones más enigmáticas del planeta. Surgiendo de la arena al oeste de El Cairo, son un testimonio asombroso de la cultura, la política y la riqueza del Antiguo Egipto.
text11 = Recorrido por las pirámides de Giza
text12 = Alhambra: la mejor arquitectura islámica de Europa
text13 = Situada en un afloramiento rocoso con los picos nevados de Sierra Nevada como telón de fondo, la Alhambra es el ejemplo más notable de arquitectura morisca de España. A pesar del abandono histórico (y de varios intentos de destruir totalmente el palacio), lo que queda hoy es simplemente la perfección.
text14 = Visita guiada a la Alhambra
text15 = Gran Muralla China
text16 = La Gran Muralla China: la mayor obra de ingeniería del mundo
text17 = La Gran Muralla China, que se alza desde los áridos desiertos de Xinjiang y se extiende miles de kilómetros hasta llegar al mar de Bohai en Laolongtou, es una perfección de la ingeniería. Hoy en día, la muralla se alza en su forma más imponente en las onduladas colinas al norte de Pekín.
text18 = Recorrido por la Gran Muralla China
text19 = Cataratas del Iguazú
text20 = Cataratas del Iguazú: el espectáculo acuático más grande de Sudamérica
text21 = Situadas en la frontera entre Argentina y Brasil, y no lejos de Paraguay, las Cataratas del Iguazú muestran el poder puro del mundo natural. Las cataratas, que se extienden por más de dos millas a lo largo de una herradura de acantilados escarpados, se pueden explorar con la ayuda de pasarelas que bombean adrenalina.
text22 = Tour a las Cataratas del Iguazú
text23 = Castillo Karlštejn: un cuento de hadas hecho realidad
text24 = Situado en un acantilado rocoso en la campiña bohemia, el castillo de Karlštejn parece sacado directamente de las páginas de un cuento de hadas. Con una historia que se remonta al siglo XIV, el castillo ha sido restaurado impecablemente en las últimas décadas y ahora luce tan resplandeciente como en la época de Carlos IV.
text25 = Excursión al castillo de Karlštejn
text26 = Playas escondidas de Cerdeña
text27 = Playas escondidas de Cerdeña: arena blanca y aguas turquesas -
text28 = Mientras que las playas de la Italia continental están repletas de turistas durante todo el verano, las de la paradisíaca isla de Cerdeña permanecen refrescantemente vírgenes. A menudo comparadas con las del Caribe, las playas de Cerdeña son algunas de las mejores de Europa, con kilómetros de arena blanca, aguas cristalinas y una estimulante sensación de aislamiento.
text29 = Tour por las playas de Cerdeña
text30 = Taj Mahal: ¿el edificio más bello del mundo?
text31 = Construido durante el siglo XVII por Shah Jahan como mausoleo para su tercera esposa, el Taj Mahal se eleva con gracia sobre la expansión urbana de la moderna Agra, prácticamente sin cambios desde su inicio. Incluso en la India, un país lleno de atracciones inolvidables, el Taj Mahal destaca del resto.
text32 = Recorrido por el Taj Mahal
text33 = Gran Barrera de Coral
text34 = La Gran Barrera de Coral: un paraíso submarino
text35 = La Gran Barrera de Coral, que se extiende por casi 2.000 kilómetros a lo largo de la costa oeste de Australia, es el ecosistema más colorido del mundo. A pesar de la amenaza del cambio climático, miles de especies de corales psicodélicos y una deslumbrante variedad de peces tropicales aún habitan el arrecife: es sencillamente inolvidable.
text36 = Crucero en catamarán por la Gran Barrera de Coral
text37 = Lagos de Plitvice
text38 = Lagos de Plitvice: la respuesta de Europa a la selva tropical
text39 = Los Alpes Dináricos, que se elevan abruptamente desde la árida costa de Dalmacia, esconden el equivalente europeo de la selva tropical: los lagos de Plitvice. En total, 16 lagos de agua cristalina están interconectados por literalmente miles de cascadas de diferentes tamaños, que se exploran a través de pasarelas que parecen flotar en la superficie del agua.
text40 = Visita guiada a los lagos de Plitvice
text41 = Museo del Hermitage
text42 = Museo del Hermitage: una fascinante mezcla de historia zarista y arte de talla mundial
text43 = Ubicado en lo que una vez fue el Palacio de Invierno del zar ruso, el Museo del Hermitage de San Petersburgo es sencillamente asombroso. Con más de tres millones de objetos en sus colecciones repartidas en casi 400 antiguos salones de banquetes, el Hermitage tiene algo que fascina a cualquier visitante.
text44 = Visita al Museo del Hermitage
text45 = Parque Nacional Kruger
text46 = Parque Nacional Kruger: El África que soñaste
text47 = El Parque Nacional Kruger es el principal destino de observación de vida silvestre del mundo. Hogar de todas las especies de safari más emblemáticas de África, incluido un completo conjunto de depredadores, el parque abarca selvas tropicales, montañas escarpadas y paisajes clásicos de sabana, lo que garantiza que un safari en Kruger sea inolvidable.
text48 = Safari en el Parque Nacional Kruger
text49 = Machu Picchu: un ícono de Sudamérica
text50 = Nunca descubierta por los conquistadores españoles y olvidada hasta principios del siglo XX, Machu Picchu es sin duda la principal atracción del Perú. Encaramada en lo alto de acantilados y aparentemente desafiando la gravedad, la antigua ciudad es un testimonio de la habilidad de los arquitectos incas y sigue siendo impresionante hasta el día de hoy.
text51 = Tour a Machu Picchu
text52 = Acrópolis de Atenas
text53 = Acrópolis: la cuna de la civilización occidental
text54 = Surgiendo de la jungla urbana no planificada de la Atenas moderna se encuentra la Acrópolis, coronada por el icónico Partenón. Las antiguas estructuras en la cima de la Acrópolis, aún revestidas de brillante mármol blanco, son un recordatorio de la grandeza de la antigua civilización griega.
text55 = Visita guiada a la Acrópolis
text56 = Petra: Una antigua maravilla olvidada hace mucho tiempo
text57 = La ciudad de Petra, una de las atracciones antiguas más enigmáticas del mundo, está medio oculta por las arenas movedizas de los desiertos de Jordania y fue en gran parte desconocida hasta el siglo XIX. Hoy en día, una visita a Petra es una visión reveladora de una civilización antigua poco conocida y ofrece una muestra de la cultura beduina moderna.
text58 = Recorrido por Petra


