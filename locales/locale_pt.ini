text29 = Imperdíveis
text30 = para a Sua Próxima Aventura
text31 = Todo viajante tem um destino dos sonhos. Os Destinos em Destaque da Country Pick destacam as melhores experiências nesses locais icônicos, das vibrantes ruas do distrito Shinjuku em Tóquio às mundialmente famosas ruínas antigas de Roma. Descubra passeios inesquecíveis que revelam joias escondidas e oferecem perspectivas únicas desses lugares imperdíveis.
text32 = Como
text33 = Funciona
text34 = Você possui a opção de selecionar cada país como "visitado" ou "desejo visitar" e depois baixar um mapa personalizado. Você também pode escrever sobre suas aventuras, fazer o upload de suas fotos de viagens e compartilhar com amigos.
text35 = Começando
text36 = Primeiramente você precisar se cadastrar gratuitamente no Country Pick
text37 = Selecione um País
text38 = Selecione qualquer país no mapa interativo acima para explorar as atrações emocionantes, passeios reveladores e acomodações disponíveis
text39 = Adicione Viagens
text40 = Inspire outros usuários do Country Pick postando suas viagens, adicionando fotos de suas aventuras e escrevendo sobre coisas que ninguém deve deixar de fazer.
text41 = Compartilhe
text42 = Use o mapa personalizado do Country Pick para compartilhar seus passeios guiados favoritos e joias escondidas no Facebook ou Twitter.
text43 = Recentes
text44 = Viagens
text45 = Recomendadas por Usuários do Country Pick
text46 = Se você tiver dicas sobre seus passeios favoritos e experiências de viagem inesquecíveis, certifique-se de compartilhá-los com Country Pick.
text47 = Por favor faça login!
text48 = Faça login para criar sua lista de países visitados e publicar suas histórias de viagem.


;Attractions
[attractions]
title = Imperdíveis atrações pelo mundo | Country Pick
description = Descubra passeios incríveis, onde se hospedar, o que fazer e as melhores atrações que cada país tem a oferecer ao redor do mundo.
text1 = Imperdíveis
text2 = Atrações
text3 = Pelo Mundo
text4 = 15 das melhores e mais populares atrações turísticas mundiais.
text5 = Grand Canyon: a maravilha natural mais icônica do mundo
text6 = Não importa o quanto você leu sobre isso, quantos documentários você assistiu ou quantas fotos viu, a imensidão do Grand Canyon sempre deixa os visitantes de primeira viagem sem palavras. Designado como uma das sete maravilhas do mundo natural, o cânion é, sem dúvida, a principal atração da América.
text7 = Excursão ao Grand Canyon
text8 = Pirâmides de Gizé
text9 = Pirâmides de Gizé: o mundo antigo ganha vida
text10 = A única maravilha antiga remanescente do mundo, as Pirâmides de Gizé são uma das atrações mais enigmáticas do planeta. Erguendo-se da areia a oeste do Cairo, eles são um testemunho de cair o queixo da cultura, política e riqueza do Egito Antigo.
text11 = Excursão às Pirâmides de Gizé
text12 = Alhambra: a melhor arquitetura islâmica da Europa
text13 = Empoleirado em um afloramento rochoso contra um pano de fundo coberto de neve dos picos da Sierra Nevada, Alhambra é o exemplo mais notável da arquitetura mourisca da Espanha. Apesar da negligência histórica (e mais do que algumas tentativas de destruir totalmente o palácio), o que resta hoje é simplesmente perfeição.
text14 = Alhambra Excursão Guiada
text15 = Muralha da China
text16 = A Grande Muralha da China: o maior feito de engenharia do mundo
text17 = Erguendo-se nos desertos áridos de Xinjiang e seguindo por milhares de quilômetros até chegar ao Mar de Bohai em Laolongtou, a Grande Muralha da China é uma perfeição da engenharia. Hoje, a muralha permanece em sua forma mais imponente nas colinas onduladas ao norte de Pequim.
text18 = Muralha da China Excursão
text19 = Cataratas do Iguaçu
text20 = Cataratas do Iguaçu: o maior show aquático da América do Sul
text21 = Situando-se na fronteira entre a Argentina e o Brasil, e não muito longe do Paraguai, as Cataratas do Iguaçu mostram a força bruta do mundo natural. Estendendo-se por mais de três quilômetros ao longo de uma ferradura de penhascos íngremes, as cachoeiras podem ser exploradas com a ajuda de passarelas de adrenalina.
text22 = Cataratas do Iguaçu Excursão
text23 = Castelo de Karlštejn: um conto de fadas que ganha vida
text24 = No alto de um precipício rochoso na zona rural da Boêmia, o Castelo de Karlštejn parece arrancado diretamente das páginas dos contos de fadas. Com uma história que remonta a 1300, o castelo foi imaculadamente restaurado nas últimas décadas e agora parece tão resplandecente como na época de Carlos IV.
text25 = Castelo de Karlštejn Excursão
text26 = Praias escondidas da Sardenha
text27 = Praias escondidas da Sardenha: areia branca e águas azul-turquesa -
text28 = Enquanto as praias do continente italiano ficam lotadas de turistas durante todo o verão, as da paradisíaca ilha da Sardenha permanecem refrescantemente intactas. Muitas vezes comparadas às do Caribe, as praias da Sardenha são algumas das melhores da Europa, com quilômetros de areia branca, águas cristalinas e uma sensação emocionante de isolamento.
text29 = Sardenha Praias Excursão
text30 = Taj Mahal: A construção mais bonita do mundo?
text31 = Construído durante o século 17 por Shah Jahan como um mausoléu para sua terceira esposa, o Taj Mahal graciosamente ergue-se da expansão urbana da Agra moderna praticamente inalterada desde o seu início. Mesmo na Índia, um país repleto de atrações inesquecíveis, o Taj Mahal se destaca dos demais.
text32 = Taj Mahal Excursão
text33 = Grande Barreira de Coral
text34 = Grande Barreira de Corais: uma terra de sonhos submarina
text35 = Estendendo-se por quase 2.000 quilômetros ao longo da costa oeste da Austrália, a Grande Barreira de Corais é o ecossistema mais colorido do mundo. Apesar da ameaça das mudanças climáticas, milhares de espécies de corais psicodélicos e uma variedade deslumbrante de peixes tropicais ainda chamam o recife de lar - é simplesmente inesquecível.
text36 = Cruzeiro de catamarã pela Grande Barreira de Corais
text37 = Lagos Plitvice
text38 = Lagos Plitvice: a resposta da Europa à floresta tropical
text39 = Os Alpes Dináricos, que se erguem abruptamente no litoral árido da Dalmácia, escondem o equivalente europeu da floresta tropical: os Lagos Plitvice. No total, 16 lagos cristalinos são interligados por literalmente milhares de cachoeiras de tamanhos variados, que são exploradas por passarelas que parecem flutuar sobre a superfície da água.
text40 = Excursão guiada pelos lagos de Plitvice
text41 = Museu Hermitage
text42 = Museu Hermitage: uma mistura atraente de história czarista e arte de classe mundial
text43 = Instalado no que já foi o Palácio de Inverno do Czar Russo, o Museu Hermitage de São Petersburgo é simplesmente de cair o queixo. Com mais de três milhões de itens em suas coleções espalhados por quase 400 vastos salões de ex-banquetes, o Hermitage tem algo para fascinar qualquer visitante.
text44 = Tour pelo Museu Hermitage
text45 = Parque Nacional Kruger
text46 = Parque Nacional Kruger: a África com a qual você sonhou
text47 = O Parque Nacional Kruger é o principal destino de observação da vida selvagem do mundo. Lar de todas as espécies icônicas de safári da África, incluindo um conjunto completo de predadores, o parque abrange florestas tropicais, montanhas escarpadas e paisagens clássicas de savana, garantindo que um safári no Kruger seja inesquecível.
text48 = Safari no Parque Nacional Kruger
text49 = Machu Picchu: um ícone da América do Sul
text50 = Nunca descoberta pelos conquistadores espanhóis e esquecida até a virada do século 20, Machu Picchu é, sem dúvida, a principal atração do Peru. No topo de penhascos e aparentemente desafiando a gravidade, a antiga cidade é um testemunho da habilidade dos arquitetos incas e permanece inspiradora até hoje.
text51 = Machu Picchu Excursão
text52 = Acrópole de Atenas
text53 = Acrópole: o berço da civilização ocidental
text54 = Erguendo-se da selva urbana não planejada da Atenas moderna está a Acrópole, que é coroada pelo icônico Partenon. Ainda revestido de mármore branco reluzente até hoje, as estruturas antigas no topo da Acrópole são uma lembrança da grandeza da civilização grega antiga.
text55 = Excursão guiada pela Acrópole
text56 = Petra: uma maravilha antiga há muito esquecida
text57 = Uma das atrações antigas mais enigmáticas do mundo, a cidade de Petra está meio obscurecida pelas areias movediças dos desertos da Jordânia e por esse motivo foi desconhecida até o século 19. Hoje, uma visita a Petra é um vislumbre revelador de uma civilização antiga pouco conhecida e oferece um gostinho da cultura beduína moderna.
text58 = Petra Excursão


