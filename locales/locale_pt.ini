title = Perguntas
title2 = Frequentes
q1 = Qual é a melhor época para visitar {country}?
a1 = A melhor época para visitar {country} depende das suas preferências. A primavera e o outono oferecem geralmente o clima mais agradável e menos movimento, sendo ideais para visitas e atividades ao ar livre. As condições sazonais variam, por isso verifique os padrões climáticos antes de reservar.
q2 = Qual é a capital de {country}?
a2 = A capital de {country} é {capital}. É o centro político e cultural do país e, normalmente, um dos principais destinos para os visitantes.
q3 = Qual é a moeda utilizada em {country}?
a3 = A moeda oficial de {country} é o {currency}. É aconselhável trocar moeda antes de viajar ou utilizar caixas automáticos à chegada para obter as melhores taxas. Os principais cartões de crédito são aceites na maioria dos hotéis e restaurantes.
q4 = Que língua se fala em {country}?
a4 = A língua oficial falada em {country} é o {language}. Nas principais zonas turísticas, hotéis e restaurantes internacionais, o inglês é frequentemente compreendido.
q5 = Quais são os principais destinos a visitar em {country}?
a5 = Os principais destinos a visitar em {country} incluem {gems}. Cada um oferece uma combinação única de cultura, história e atrações naturais que tornam {country} um destino de viagem recompensador.

[city_faq]
q1 = Quais são as melhores coisas para fazer em {city}?
a1 = {city} oferece uma grande variedade de atividades e atrações emocionantes. As principais coisas a fazer incluem {things}. Quer se interesse por história, cultura, gastronomia ou aventuras ao ar livre, há algo para todos os tipos de viajantes.
q2 = Onde fica {city}?
a2 = {city} fica localizada em {country}. É um dos destinos mais visitados do país, conhecido pela sua cultura, história e atrações naturais únicas.
q3 = Vale a pena visitar {city}?
a3 = Sem dúvida. {city} é um dos destinos mais gratificantes de {country}, oferecendo uma rica combinação de cultura, história e beleza natural. Os visitantes classificam-na consistentemente como um ponto alto de qualquer viagem a {country}.

