description = Create your own visited countries map and share with friends and family completely FREE. Select the countries you visited, save the map and share it.
text1 = Лучшие исторические города
text2 =
desc = На карте ниже выберите страны, которые вы посетили и хотите посетить.
text3 = Looking for Unique
text4 = Guided Tours
text5 = and Attractions? Country Pick has You Covered
text6 = From the dazzling coral reefs of Australia to the snow-capped Rocky Mountains and from Europe’s iconic museums to Southeast Asia’s mouth-watering culinary traditions, Country Pick lets you discover hidden gems across the globe with thought provoking tours and unforgettable things to do.
text7 = Best Things To Do
text8 = See Pink Dolphins on the Amazon
text9 = Amazon - Brazil
text10 = Visit Quebec City Aquarium
text11 = Quebec - Canada
text12 = Kruger National Park Safari
text13 = Kruger National Park - South Africa
text14 = Top Rated Guided Tours
text15 = Alhambra and Generalife Guided Tour
text16 = Granada - Spain
text17 = Golden Circle Tour
text18 = Reykjavik - Iceland
text19 = Uluru and Kata Tjuta Tour
text20 = Uluru-Kata - Australia
text21 = Best Worldwide Attractions
text22 = Taj Mahal
text23 = Agra - India
text24 = Antelope Canyon
text25 = Page - United States
text26 = Phuket
text27 = Phuket - Thailand
text28 = Featured
text29 = Destinations
text30 = for Travel Inspiration
text31 = There are some places on every traveller’s bucket list. Country Pick’s Featured Destinations curates the best experiences in these iconic destinations so that from the vibrant streets of Tokyo’s Shinjuku district to the world famous ancient ruins of Rome you will be able to find tours that reveal unforgettable hidden gems.
text32 = How
text33 = Works
text34 = Once you have experienced the country first hand, mark it as visited on your map, write about your adventures, upload your holiday pictures to inspire other Country Pick users and download your personalized map to share with friends and family on social media.
text35 = Getting Started
text36 = The first step to uncovering the world’s hidden gems is to create a free Country Pick account.
text37 = Pick a Country
text38 = Select any country on the interactive map above to explore the thrilling attractions, eye-opening tours and boutique accommodation available
text39 = Add Your Trips
text40 = Inspire other Country Pick users by creating new trips based on your experiences, adding photos of your adventures and writing about once in a lifetime things to do.
text41 = Share with Friends
text42 = Use Country Pick’s personalised map to share your favourite guided tours and hidden gems on social media platforms.
text43 = Latest
text44 = Trips
text45 = Recommended by Country Pick Users
text46 = If you have insider tips on your favourite tours and unforgettable travelling experiences make sure to share them with Country Pick where they will be featured on our homepage to get other users in the trailblazing spirit.
text47 = Please Login First!
text48 = Please login to create your list of visited countries and post your travel stories.

